<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skillze Admin | Stories Monitoring</title>
  <link rel="stylesheet" href="assets/abyssal.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Manrope:wght@800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    .story-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 25px; }
    .story-card { background: var(--surface-high); border-radius: 1.25rem; overflow: hidden; position: relative; aspect-ratio: 9/16; cursor: pointer; border: 2px solid transparent; transition: all 0.3s; }
    .story-card:hover { border-color: var(--primary); transform: scale(1.02); }
    .story-media { width: 100%; height: 100%; object-fit: cover; }
    .story-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 15px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: white; }
    .story-author { display: flex; align-items: center; gap: 8px; font-size: 11px; }
    .delete-btn { position: absolute; top: 10px; right: 10px; background: rgba(255, 113, 108, 0.2); color: #ff716c; border: none; padding: 8px; border-radius: 50%; backdrop-filter: blur(4px); cursor: pointer; font-size: 14px; opacity: 0; transition: opacity 0.2s; }
    .story-card:hover .delete-btn { opacity: 1; }
  </style>
</head>
<body>

  <div class="admin-layout">
    <aside class="sidebar">
      <div class="logo-section">
        <div class="logo-dot"></div>
        <h2 class="brand-text">Skillze <span style="color: var(--on-surface-variant); font-size: 0.8rem; font-weight: 500;">Admin</span></h2>
      </div>

      <nav class="nav-links">
        <a href="index.html" class="nav-item">
          <i class="bi bi-grid-1x2-fill"></i> Dashboard
        </a>
        <a href="users.html" class="nav-item">
          <i class="bi bi-people-fill"></i> Users
        </a>
        <a href="posts.html" class="nav-item">
          <i class="bi bi-collection-play-fill"></i> Posts
        </a>
        <a href="stories.html" class="nav-item active">
          <i class="bi bi-clock-history"></i> Stories
        </a>
        <a href="moderation.html" class="nav-item">
          <i class="bi bi-shield-lock-fill"></i> Moderation
        </a>
        <a href="skills.html" class="nav-item">
          <i class="bi bi-tags-fill"></i> Taxonomies
        </a>
        <a href="broadcast.html" class="nav-item">
          <i class="bi bi-broadcast"></i> Broadcast
        </a>
      </nav>

      <div style="margin-top: auto;">
        <a href="login.html" class="nav-item" style="color: var(--error);">
          <i class="bi bi-box-arrow-right"></i> Logout
        </a>
      </div>
    </aside>

    <main class="main-viewport">
      <header class="page-header" style="display: flex; justify-content: space-between; align-items: flex-end;">
        <div>
          <h1 class="page-title">Ephemeral Hub</h1>
          <p style="color: var(--on-surface-variant);">Monitor live stories active for the next 24 hours.</p>
        </div>
        <div style="display: flex; gap: 10px;">
           <input type="text" id="storySearch" placeholder="Search by author or caption..." style="background: var(--surface-high); border: none; padding: 12px 18px; border-radius: 10px; color: white; width: 250px;">
        </div>
      </header>

      <section class="story-grid" id="storyGrid">
        <div style="grid-column: 1/-1; text-align: center; color: var(--on-surface-variant); padding: 50px;">Scanning for live stories...</div>
      </section>

      <footer style="margin-top: 40px; display: flex; justify-content: space-between; align-items: center; color: var(--on-surface-variant); font-size: 0.85rem;">
        <div id="paginationText">Showing stories...</div>
        <div style="display: flex; gap: 20px; font-weight: 700;">
           <span id="prevBtn" onclick="prevPage()" style="cursor: pointer; color: var(--primary);">PREVIOUS</span>
           <span id="nextBtn" onclick="nextPage()" style="cursor: pointer; color: var(--on-surface);">NEXT</span>
        </div>
      </footer>
    </main>
  </div>

  <script type="module">
    import { listenToStories, formatTimestamp, deleteContent } from './assets/data-service.js';

    const grid = document.getElementById('storyGrid');
    const searchInput = document.getElementById('storySearch');
    const paginationText = document.getElementById('paginationText');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    let allStories = [];
    let filteredStories = [];
    let currentPage = 1;
    const pageSize = 10;

    window.deleteStory = async (id) => {
      if(confirm("Permanently delete this story?")) {
        try {
          await deleteContent('story', id);
          alert("Story removed.");
        } catch (e) { alert("Failed to remove."); }
      }
    };

    if (searchInput) {
      searchInput.addEventListener('input', () => {
        processStories();
      });
    }

    function processStories() {
      const term = searchInput ? searchInput.value.toLowerCase() : '';
      let combined = [...allStories];
      
      if (term) {
        combined = combined.filter(s => 
          (s.userName || s.authorName || s.name || '').toLowerCase().includes(term) ||
          (s.caption || '').toLowerCase().includes(term)
        );
      }

      combined.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
      filteredStories = combined;
      currentPage = 1;
      renderGrid();
    }

    function renderGrid() {
      const start = (currentPage - 1) * pageSize;
      const end = start + pageSize;
      const pageData = filteredStories.slice(start, end);

      if (filteredStories.length === 0) {
        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px;">No matching stories found.</div>';
        paginationText.innerText = "0 stories found";
        prevBtn.style.display = 'none';
        nextBtn.style.display = 'none';
        return;
      }

      grid.innerHTML = pageData.map(story => {
        const media = story.mediaUrl || 'https://images.unsplash.com/photo-1542038784456-1ea8e935640e?q=80&w=400';
        const author = story.userName || story.authorName || story.name || 'Unknown';
        return `
          <div class="story-card">
            <img src="${media}" class="story-media">
            <button class="delete-btn" onclick="deleteStory('${story.id}')" title="Delete Story"><i class="bi bi-trash3-fill"></i></button>
            <div class="story-overlay">
              <div class="story-author">
                <div style="width: 18px; height: 18px; border-radius: 50%; background: var(--primary); overflow: hidden;">
                  <img src="${story.userAvatar || `https://ui-avatars.com/api/?name=${author}`}" style="width:100%; height:100%; object-fit:cover;">
                </div>
                <span>@${author} • ${formatTimestamp(story.timestamp)}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');

      const total = filteredStories.length;
      paginationText.innerText = `Showing ${start + 1}-${Math.min(end, total)} of ${total} active highlights`;
      prevBtn.style.display = 'inline';
      nextBtn.style.display = 'inline';
      prevBtn.style.opacity = currentPage === 1 ? '0.3' : '1';
      prevBtn.style.pointerEvents = currentPage === 1 ? 'none' : 'auto';
      nextBtn.style.opacity = end >= total ? '0.3' : '1';
      nextBtn.style.pointerEvents = end >= total ? 'none' : 'auto';
    }

    window.nextPage = () => { if ((currentPage * pageSize) < filteredStories.length) { currentPage++; renderGrid(); } };
    window.prevPage = () => { if (currentPage > 1) { currentPage--; renderGrid(); } };

    listenToStories((stories) => {
      allStories = stories;
      processStories();
    });
  </script>
</body>
</html>
