<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skillze Admin | Content & Stories Hub</title>
  <link rel="stylesheet" href="assets/abyssal.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Manrope:wght@800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    .post-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .post-card { background: var(--surface-high); border-radius: 1rem; overflow: hidden; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s; cursor: pointer; }
    .post-card:hover { transform: translateY(-8px); background: var(--surface-bright); }
    .post-preview { height: 180px; background-size: cover; background-position: center; position: relative; }
    .post-type { position: absolute; top: 12px; right: 12px; padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 700; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); color: white; text-transform: uppercase; }
    .post-info { padding: 15px; }
    .post-author { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--on-surface-variant); margin-top: 10px; }

    /* Comments Drawer Styles */
    .comments-drawer { position: fixed; top: 0; right: -450px; width: 450px; height: 100vh; background: var(--surface); box-shadow: -10px 0 50px rgba(0,0,0,0.8); z-index: 2000; transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; border-left: 1px solid rgba(255,255,255,0.05); }
    .comments-drawer.open { right: 0; }
    .drawer-header { padding: 30px; background: var(--surface-high); display: flex; justify-content: space-between; align-items: center; }
    .drawer-close { cursor: pointer; font-size: 1.5rem; color: var(--on-surface-variant); transition: color 0.2s; }
    .drawer-close:hover { color: var(--error); }
    .comments-list { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
    .comment-card { background: var(--surface-high); padding: 15px; border-radius: 12px; position: relative; transition: background 0.2s; }
    .comment-card:hover { background: var(--surface-bright); }
    .comment-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .comment-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
    .comment-meta { font-size: 11px; color: var(--on-surface-variant); }
    .comment-content { font-size: 13px; color: var(--on-surface); line-height: 1.5; }
    .drawer-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; display: none; }
    .drawer-overlay.active { display: block; }
  </style>
</head>
<body>

  <div class="admin-layout">
    <aside class="sidebar">
      <div class="logo-section">
        <div class="logo-dot"></div>
        <h2 class="brand-text">Skillze <span style="color: var(--on-surface-variant); font-size: 0.8rem; font-weight: 500;">Admin</span></h2>
      </div>

      <nav class="nav-links">
        <a href="index.html" class="nav-item">
          <i class="bi bi-grid-1x2-fill"></i> Dashboard
        </a>
        <a href="users.html" class="nav-item">
          <i class="bi bi-people-fill"></i> Users
        </a>
        <a href="posts.html" class="nav-item active">
          <i class="bi bi-collection-play-fill"></i> Posts
        </a>
        <a href="stories.html" class="nav-item">
          <i class="bi bi-clock-history"></i> Stories
        </a>
        <a href="chats.html" class="nav-item">
          <i class="bi bi-chat-dots-fill"></i> Chats
        </a>
        <a href="moderation.html" class="nav-item">
          <i class="bi bi-shield-lock-fill"></i> Moderation
        </a>
        <a href="skills.html" class="nav-item">
          <i class="bi bi-tags-fill"></i> Taxonomies
        </a>
        <a href="broadcast.html" class="nav-item">
          <i class="bi bi-broadcast"></i> Broadcast
        </a>
      </nav>

      <div style="margin-top: auto;">
        <a href="login.html" class="nav-item" style="color: var(--error);">
          <i class="bi bi-box-arrow-right"></i> Logout
        </a>
      </div>
    </aside>

    <main class="main-viewport">
      <header class="page-header" style="display: flex; justify-content: space-between; align-items: flex-end;">
        <div>
          <h1 class="page-title">Posts Discovery</h1>
          <p style="color: var(--on-surface-variant);">Monitor and moderate permanent platform content.</p>
        </div>
        <div style="display: flex; gap: 10px;">
          <input type="text" id="postSearch" placeholder="Search by content or author..." style="background: var(--surface-high); border: none; padding: 12px 18px; border-radius: 10px; color: white; width: 250px;">
          <select style="background: var(--surface-high); border: none; padding: 12px 18px; border-radius: 10px; color: white; outline: none; cursor: pointer;">
            <option value="Posts">Posts</option>
            <option value="AllTypes">All Types</option>
            <option value="Stories">Stories</option>
          </select>
          <button class="btn-primary">Review Queue</button>
        </div>
      </header>

      <section class="post-grid" id="postGrid">
        <div style="grid-column: 1/-1; text-align: center; color: var(--on-surface-variant); padding: 50px;">Scanning Sky for Content...</div>
      </section>

      <footer style="margin-top: 40px; display: flex; justify-content: space-between; align-items: center; color: var(--on-surface-variant); font-size: 0.85rem;">
        <div id="paginationText">Showing discoveries...</div>
        <div style="display: flex; gap: 20px; font-weight: 700;">
           <span id="prevBtn" onclick="prevPage()" style="cursor: pointer; color: var(--primary);">PREVIOUS</span>
           <span id="nextBtn" onclick="nextPage()" style="cursor: pointer; color: var(--on-surface);">NEXT</span>
        </div>
      </footer>
    </main>
  </div>

  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <aside class="comments-drawer" id="commentsDrawer">
    <div class="drawer-header">
      <div>
        <h3 style="margin-bottom: 4px;">Comments</h3>
        <p id="drawerPostDesc" style="font-size: 12px; color: var(--on-surface-variant); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px;">Viewing post interactions</p>
      </div>
      <i class="bi bi-x-lg drawer-close" onclick="closeDrawer()"></i>
    </div>
    <div class="comments-list" id="commentsList">
       <!-- Loaded via JS -->
       <div style="text-align: center; color: var(--on-surface-variant); padding-top: 50px;">Select a post to view comments.</div>
    </div>
  </aside>

  <script type="module">
     import { listenToPosts, listenToStories, formatTimestamp, deleteContent, listenToComments, deleteComment } from './assets/data-service.js';

     const grid = document.getElementById('postGrid');
     const typeFilter = document.querySelector('select');
     const searchInput = document.getElementById('postSearch');
     const paginationText = document.getElementById('paginationText');
     const prevBtn = document.getElementById('prevBtn');
     const nextBtn = document.getElementById('nextBtn');

     let allContent = { posts: [], stories: [] };
     let filteredContent = [];
     let currentFilter = 'Posts';
     let currentPage = 1;
     const pageSize = 10;
     let activeCommentsUnsubscribe = null;

     window.deleteItem = async (type, id, event) => {
       if (event) event.stopPropagation(); // Avoid opening drawer
       if(confirm(`Are you sure you want to permanently delete this ${type}?`)) {
         try {
           await deleteContent(type, id);
           alert("Content deleted.");
         } catch (e) { alert("Deletion failed."); }
       }
     };

     window.removeComment = async (postId, commentId, event) => {
        if (event) event.stopPropagation();
        if(confirm("Permanently delete this comment?")) {
            try {
                await deleteComment(postId, commentId);
            } catch (e) { alert("Deletion failed."); }
        }
     };

     window.viewComments = (postId, postText) => {
        const drawer = document.getElementById('commentsDrawer');
        const overlay = document.getElementById('drawerOverlay');
        const list = document.getElementById('commentsList');
        const desc = document.getElementById('drawerPostDesc');

        desc.innerText = postText || "Viewing post interactions";
        drawer.classList.add('open');
        overlay.classList.add('active');
        list.innerHTML = `<div style="text-align: center; color: var(--on-surface-variant); padding-top: 50px;"><i class="bi bi-hourglass-split"></i> Gathering feedback...</div>`;

        if (activeCommentsUnsubscribe) activeCommentsUnsubscribe();

        activeCommentsUnsubscribe = listenToComments(postId, (comments) => {
            if (comments.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: var(--on-surface-variant); padding-top: 50px;">No comments found on this post.</div>';
                return;
            }

            list.innerHTML = comments.map(c => `
                <div class="comment-card">
                    <div class="comment-header">
                        <img src="${c.authorProfileImageUrl || `https://ui-avatars.com/api/?name=${c.authorName}`}" class="comment-avatar">
                        <div>
                            <div style="font-size: 13px; font-weight: 700;">${c.authorName || 'Anonymous'}</div>
                            <div class="comment-meta">${formatTimestamp(c.timestamp)}</div>
                        </div>
                        <i class="bi bi-trash3-fill" style="margin-left: auto; cursor: pointer; color: var(--error); opacity: 0.5;" onclick="removeComment('${postId}', '${c.id}', event)"></i>
                    </div>
                    <div class="comment-content">${c.content}</div>
                </div>
            `).join('');
        });
     };

     window.closeDrawer = () => {
        document.getElementById('commentsDrawer').classList.remove('open');
        document.getElementById('drawerOverlay').classList.remove('active');
        if (activeCommentsUnsubscribe) {
            activeCommentsUnsubscribe();
            activeCommentsUnsubscribe = null;
        }
     };

     if (typeFilter) {
       typeFilter.addEventListener('change', (e) => {
         currentFilter = e.target.value;
         processContent();
       });
     }

     if (searchInput) {
       searchInput.addEventListener('input', () => {
         processContent();
       });
     }

     function processContent() {
       let combined = [];
       if (currentFilter === 'AllTypes' || currentFilter === 'Posts') combined = [...combined, ...allContent.posts];
       if (currentFilter === 'AllTypes' || currentFilter === 'Stories') combined = [...combined, ...allContent.stories];
       
       const term = searchInput ? searchInput.value.toLowerCase() : '';
       if (term) {
         combined = combined.filter(item => 
           (item.content || item.caption || '').toLowerCase().includes(term) ||
           (item.authorName || item.userName || item.name || '').toLowerCase().includes(term)
         );
       }

       combined.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
       filteredContent = combined;
       currentPage = 1;
       renderGrid();
     }

     function renderGrid() {
       const start = (currentPage - 1) * pageSize;
       const end = start + pageSize;
       const pageData = filteredContent.slice(start, end);

       if (filteredContent.length === 0) {
         grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--on-surface-variant); padding: 50px;">No content found matching filters.</div>';
         paginationText.innerText = "0 items found";
         prevBtn.style.display = 'none';
         nextBtn.style.display = 'none';
         return;
       }

       grid.innerHTML = pageData.map(item => {
         const isStory = item.type === 'story';
         const media = item.mediaUrl || (item.mediaUrls && item.mediaUrls[0]) || 'https://images.unsplash.com/photo-1542038784456-1ea8e935640e?q=80&w=400';
         const author = item.authorName || item.userName || item.name || 'Unknown';
         const postText = (item.content || item.caption || 'Project Update').replace(/'/g, "\\'");
         
         return `
           <div class="post-card" onclick="viewComments('${item.id}', '${postText}')">
             <div class="post-preview" style="background-image: url('${media}');">
               <span class="post-type" style="${isStory ? 'background: #667eea; color: white;' : 'background: #3bbffa; color: var(--background);'}">${item.type}</span>
             </div>
             <div class="post-info">
               <h4 style="font-weight: 700; font-size: 0.95rem; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${item.content || item.caption || 'No description...'}</h4>
               <div class="post-author">
                  <div style="width: 20px; height: 20px; border-radius: 50%; background: #3bbffa; overflow: hidden;">
                    <img src="${item.authorProfileUrl || item.userAvatar || `https://ui-avatars.com/api/?name=${author}`}" style="width:100%; height:100%; object-fit:cover;">
                  </div> 
                  @${author} • ${formatTimestamp(item.timestamp)}
               </div>
               <div style="display: flex; justify-content: space-between; margin-top: 15px; align-items: center;">
                 <span style="font-size: 11px; color: var(--on-surface-variant);">
                   ${isStory ? `<i class="bi bi-clock"></i> 24h` : `<i class="bi bi-heart-fill" style="color: var(--error);"></i> ${item.likesCount || 0}`}
                 </span>
                 <button onclick="deleteItem('${item.type}', '${item.id}', event)" style="border: none; background: rgba(255, 113, 108, 0.1); color: var(--error); font-size: 11px; padding: 6px 12px; border-radius: 6px; font-weight: 700; cursor: pointer;"><i class="bi bi-trash3-fill"></i> Delete</button>
               </div>
             </div>
           </div>
         `;
       }).join('');

       // UI controls
       const total = filteredContent.length;
       paginationText.innerText = `Showing ${start + 1}-${Math.min(end, total)} of ${total} platform discoveries`;
       prevBtn.style.display = 'inline';
       nextBtn.style.display = 'inline';
       prevBtn.style.opacity = currentPage === 1 ? '0.3' : '1';
       prevBtn.style.pointerEvents = currentPage === 1 ? 'none' : 'auto';
       nextBtn.style.opacity = end >= total ? '0.3' : '1';
       nextBtn.style.pointerEvents = end >= total ? 'none' : 'auto';
     }

     window.nextPage = () => { if ((currentPage * pageSize) < filteredContent.length) { currentPage++; renderGrid(); } };
     window.prevPage = () => { if (currentPage > 1) { currentPage--; renderGrid(); } };

     listenToPosts((posts) => {
       allContent.posts = posts;
       processContent();
     });

     listenToStories((stories) => {
       allContent.stories = stories.map(s => ({...s, type: 'story'}));
       processContent();
     });
  </script>

</body>
</html>
